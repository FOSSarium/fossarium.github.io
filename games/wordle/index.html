<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle Clone - Spectrum</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../styles/main.css">
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body class="game-body">
    <script>
        const savedTheme = localStorage.getItem('spectrum-theme');
        if (savedTheme === 'light' || (!savedTheme && window.matchMedia('(prefers-color-scheme: light)').matches)) {
            document.documentElement.classList.add('light-theme');
        }
    </script>
    <div class="app-container game-container-wrapper">
        <header class="game-header">
            <a href="../../index.html" class="back-button">&larr; Back to Spectrum</a>
            <h1>Wordle</h1>
            <div class="header-btns">
                <button id="restart-btn" class="icon-btn" title="New Game"><ion-icon name="refresh"></ion-icon></button>
            </div>
        </header>

        <div class="game-board-container">
            <!-- 6 Rows x 5 Cols Grid -->
            <div id="wordle-board" class="wordle-board">
            </div>
        </div>

        <div id="keyboard" class="keyboard">
            <div class="keyboard-row">
                <button data-key="q">Q</button><button data-key="w">W</button><button data-key="e">E</button><button
                    data-key="r">R</button><button data-key="t">T</button><button data-key="y">Y</button><button
                    data-key="u">U</button><button data-key="i">I</button><button data-key="o">O</button><button
                    data-key="p">P</button>
            </div>
            <div class="keyboard-row">
                <div class="spacer"></div><button data-key="a">A</button><button data-key="s">S</button><button
                    data-key="d">D</button><button data-key="f">F</button><button data-key="g">G</button><button
                    data-key="h">H</button><button data-key="j">J</button><button data-key="k">K</button><button
                    data-key="l">L</button>
                <div class="spacer"></div>
            </div>
            <div class="keyboard-row">
                <button data-key="Enter" class="wide-btn">ENTER</button>
                <button data-key="z">Z</button><button data-key="x">X</button><button data-key="c">C</button><button
                    data-key="v">V</button><button data-key="b">B</button><button data-key="n">N</button><button
                    data-key="m">M</button>
                <button data-key="Backspace" class="wide-btn"><ion-icon name="backspace"></ion-icon></button>
            </div>
        </div>

        <!-- Toast Notification -->
        <div id="toast" class="toast">Not in word list</div>
    </div>

    <script src="words.js"></script>
    <script src="script.js"></script>
</body>

</html>
