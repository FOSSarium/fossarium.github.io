<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Shooter - FOSSarium</title>
    <meta name="description" content="Match and pop colored bubbles in this classic arcade puzzle.">
    <!-- Ionicons -->
    <script type="module" src="../../assets/icons/ionicons.esm.js"></script>
    <script nomodule src="../../assets/icons/ionicons.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>
    <div class="app-container" id="game-root">
        <div class="game-header">
            <h1>Bubble Shooter</h1>
            <div class="header-actions">
                <button class="icon-btn" id="theme-toggle" title="Toggle Theme" aria-label="Toggle Theme">
                    <ion-icon name="sunny-outline"></ion-icon>
                </button>
                <button class="icon-btn" id="exit-fs-btn" title="Exit Fullscreen" aria-label="Exit Fullscreen">
                    <ion-icon name="close-outline"></ion-icon>
                </button>
                <button class="icon-btn" id="help-btn" title="Help">?</button>
                <button class="icon-btn" id="fullscreen-btn" title="Fullscreen">⛶</button>
            </div>
        </div>
        <div class="stats-bar">
            <div class="stat"><span class="stat-label">Score</span><span class="stat-value" id="score">0</span></div>
            <div class="stat"><span class="stat-label">Bubbles</span><span class="stat-value" id="remaining">0</span></div>
        </div>
        <div class="canvas-wrap"><canvas id="canvas"></canvas></div>
        <button class="action-btn primary" id="new-btn">New Game</button>
        <div class="overlay hidden" id="gameover-overlay">
            <div class="overlay-card">
                <div class="win-icon" id="go-icon">🎯</div>
                <h2 id="go-title">Game Over</h2>
                <p>Score: <strong id="final-score">0</strong></p>
                <button class="action-btn primary" id="play-again-btn">Play Again</button>
            </div>
        </div>
        <div class="overlay hidden" id="help-overlay">
            <div class="overlay-card">
                <h2>How to Play</h2>
                <ul>
                    <li><strong>Aim</strong> and <strong>click/tap</strong> to shoot a bubble.</li>
                    <li>Match <strong>3 or more</strong> same-colored bubbles to pop them.</li>
                    <li>Floating bubbles that are disconnected will also fall.</li>
                    <li>Clear all bubbles to win!</li>
                </ul>
                <button class="action-btn primary" id="close-help-btn">Got It</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
