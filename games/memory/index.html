<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game - FOSSarium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body class="game-body">
    <div class="app-container game-container-wrapper">
        <a href="../../index.html" class="back-button">&larr; Back to FOSSarium</a>

        <div class="game-header">
            <div class="game-title">
                <h1>Memory Game</h1>
            </div>
            <div class="score-container">
                <div class="score-box">
                    <span class="score-label">MOVES</span>
                    <span id="moves">0</span>
                </div>
                <div class="score-box">
                    <span class="score-label">TIME</span>
                    <span id="time">0s</span>
                </div>
            </div>
        </div>

        <div class="game-controls">
            <button id="restart-btn" class="primary-btn">Restart Game</button>
        </div>

        <div class="game-board-container">
            <div class="memory-board" id="memory-board">
                <!-- Cards will be generated here -->
            </div>

            <div id="game-message" class="game-message hidden">
                <h2>You Won!</h2>
                <p>Moves: <span id="final-moves">0</span> | Time: <span id="final-time">0</span>s</p>
                <button id="play-again-btn" class="primary-btn">Play Again</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
