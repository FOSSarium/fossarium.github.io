<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guess - FOSSarium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="game-body">
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>
    <div class="app-container game-container-wrapper"><a href="../../index.html" class="back-button">&larr; Back to
            FOSSarium</a>
        <div class="game-header">
            <h1>Number Guess</h1>
            <p class="sub">I'm thinking of a number between 1 and 100.</p>
        </div>
        <div class="input-row"><input type="number" id="guess-input" min="1" max="100" placeholder="Your guess"><button
                id="guess-btn" class="action-btn primary">Guess</button></div>
        <div class="info">Attempts: <span id="attempts">0</span></div>
        <div id="hint" class="hint-text"></div>
        <div id="history" class="history"></div><button id="new-btn" class="action-btn secondary">New Game</button>
    </div>
    <script src="script.js"></script>
</body>

</html>
