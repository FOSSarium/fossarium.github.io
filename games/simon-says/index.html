<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says - FOSSarium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="game-body">
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>
    <div class="app-container game-container-wrapper"><a href="../../index.html" class="back-button">&larr; Back to
            FOSSarium</a>
        <div class="game-header">
            <h1>Simon Says</h1>
            <p class="info">Round: <span id="round">0</span></p>
        </div>
        <div class="simon-board">
            <div class="simon-btn" id="btn-0" data-i="0"></div>
            <div class="simon-btn" id="btn-1" data-i="1"></div>
            <div class="simon-btn" id="btn-2" data-i="2"></div>
            <div class="simon-btn" id="btn-3" data-i="3"></div>
        </div>
        <div id="msg" class="msg">Press Start to begin</div><button id="start-btn"
            class="action-btn primary">Start</button>
    </div>
    <script src="script.js"></script>
</body>

</html>
