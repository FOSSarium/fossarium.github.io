<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe - FOSSarium</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="game-body">
    <script>
        const savedTheme = localStorage.getItem('fossarium-theme');
        if (savedTheme === 'light' || (!savedTheme && window.matchMedia('(prefers-color-scheme: light)').matches)) {
            document.documentElement.classList.add('light-theme');
        }
    </script>
    <div class="app-container game-container-wrapper">
        <div class="header-nav">
            <a href="../../index.html" class="back-button">&larr; Back to FOSSarium</a>
        </div>

        <div class="game-header">
            <div class="game-title">
                <h1>Tic-Tac-Toe</h1>
            </div>
            <div id="status" class="status">Player X's Turn</div>
        </div>

        <div class="game-board-container">
            <div class="board" id="gameBoard">
                <div class="cell" data-cell-index="0"></div>
                <div class="cell" data-cell-index="1"></div>
                <div class="cell" data-cell-index="2"></div>
                <div class="cell" data-cell-index="3"></div>
                <div class="cell" data-cell-index="4"></div>
                <div class="cell" data-cell-index="5"></div>
                <div class="cell" data-cell-index="6"></div>
                <div class="cell" data-cell-index="7"></div>
                <div class="cell" data-cell-index="8"></div>
            </div>
            
            <div class="game-controls">
                <button id="restartButton" class="primary-btn">Restart Game</button>
            </div>
        </div>

        <div style="text-align: center; margin-top: 30px; font-family: 'Inter', sans-serif; color: var(--text-muted); font-size: 0.9rem;">
            Credit - The FOSSarium Project
            <p style="font-size: 0.8rem; margin-top: 5px;">FOSS and built by FOSSarium with love in 2026</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
