<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 - FOSSarium</title>
    <!-- Use the main spectrum fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="game-body">
    <div class="app-container game-container-wrapper">
        <a href="../../index.html" class="back-button">&larr; Back to FOSSarium</a>

        <div class="game-header">
            <div class="game-title">
                <h1>2048</h1>
                <p>Join the numbers and get to the <strong>2048 tile!</strong></p>
            </div>
            <div class="score-container">
                <div class="score-box">
                    <span class="score-label">SCORE</span>
                    <span id="score">0</span>
                </div>
                <div class="score-box">
                    <span class="score-label">BEST</span>
                    <span id="best-score">0</span>
                </div>
            </div>
        </div>

        <div class="game-controls">
            <button id="restart-btn" class="primary-btn">New Game</button>
        </div>

        <div class="game-board-container">
            <div id="game-message" class="game-message hidden">
                <p id="message-text">Game Over!</p>
                <button id="retry-btn">Try Again</button>
            </div>
            <div class="game-board" id="grid">
                <!-- 16 grid cells will be generated by JS -->
            </div>
        </div>

        <script src="script.js"></script>
</body>

</html>
