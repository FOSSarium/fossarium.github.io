<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakout - Spectrum</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../styles/main.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="game-body">
    <script>const s = localStorage.getItem('spectrum-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>
    <div class="app-container game-container-wrapper"><a href="../../index.html" class="back-button">&larr; Back to
            Spectrum</a>
        <div class="game-header">
            <h1>Breakout</h1><span class="score">Score: <span id="score">0</span></span>
        </div><canvas id="canvas" width="480" height="400"></canvas>
        <div id="msg" class="msg">Click to Start</div>
    </div>
    <script src="script.js"></script>
</body>

</html>
