<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dots and Boxes - FOSSarium</title>
    <meta name="description" content="Connect dots, complete boxes, and outscore your opponent!">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>
    <div class="app-container" id="game-root">
        <a href="../../index.html" class="back-button">&larr; Back to FOSSarium</a>
        <div class="game-header">
            <h1>Dots & Boxes</h1>
            <div class="header-actions">
                <button class="icon-btn" id="help-btn" title="Help">?</button>
                <button class="icon-btn" id="fullscreen-btn" title="Fullscreen">⛶</button>
            </div>
        </div>
        <div class="stats-bar">
            <div class="stat p1-stat"><span class="stat-label">You</span><span class="stat-value" id="p1-score">0</span></div>
            <div class="stat turn-stat"><span class="stat-label">Turn</span><span class="stat-value" id="turn">Your turn</span></div>
            <div class="stat p2-stat"><span class="stat-label">CPU</span><span class="stat-value" id="p2-score">0</span></div>
        </div>
        <div class="board-wrap"><div class="board" id="board"></div></div>
        <button class="action-btn primary" id="new-btn">New Game</button>
        <div class="overlay hidden" id="gameover-overlay">
            <div class="overlay-card">
                <div class="win-icon" id="go-icon">🎉</div>
                <h2 id="go-title">You Win!</h2>
                <p id="go-msg"></p>
                <button class="action-btn primary" id="play-again-btn">Play Again</button>
            </div>
        </div>
        <div class="overlay hidden" id="help-overlay">
            <div class="overlay-card">
                <h2>How to Play</h2>
                <ul>
                    <li>Click a <strong>line between two dots</strong> to draw it.</li>
                    <li>Completing the <strong>4th side</strong> of a box claims it for you.</li>
                    <li>If you complete a box, you get an <strong>extra turn</strong>.</li>
                    <li>The player with <strong>more boxes</strong> at the end wins!</li>
                </ul>
                <button class="action-btn primary" id="close-help-btn">Got It</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
