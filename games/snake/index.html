<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake - Spectrum</title>
    <link rel="stylesheet" href="../../styles/main.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Snake</h1>
        <p><a href="../../index.html">← Back to Home</a></p>
    </header>
    <main>
        <div id="game-container">
            <div id="score-board">Score: <span id="score">0</span> | High Score: <span id="high-score">0</span></div>
            <canvas id="snakeGame" width="400" height="400"></canvas>
            <div id="controls">
                <p>Use <b>Arrow Keys</b> or <b>WASD</b> to move.</p>
                <button id="start-btn">Start / Restart</button>
            </div>
        </div>
    </main>
    <footer>
        <p>&copy; 2024 Spectrum Project</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
