<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Match - FOSSarium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="game-body">
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>
    <div class="app-container game-container-wrapper"><a href="../../index.html" class="back-button">&larr; Back to
            FOSSarium</a>
        <div class="game-header">
            <h1>Color Match</h1>
            <div class="stats"><span>Score: <span id="score">0</span></span><span>Time: <span
                        id="time">30</span>s</span></div>
        </div>
        <div class="prompt">Does the <strong>text color</strong> match the <strong>word</strong>?</div>
        <div class="color-word" id="word">RED</div>
        <div class="buttons"><button id="yes-btn" class="action-btn yes">✓ Yes</button><button id="no-btn"
                class="action-btn no">✗ No</button></div><button id="start-btn" class="action-btn primary">Start
            Game</button>
    </div>
    <script src="script.js"></script>
</body>

</html>
