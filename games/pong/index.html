<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong - Spectrum</title>
    <link href="https://fonts.googleapis.com/css2?family=Internal&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../styles/main.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="game-body">
    <div class="app-container game-container-wrapper">
        <a href="../../index.html" class="back-button">&larr; Back to Spectrum</a>

        <div class="game-header">
            <div class="game-title">
                <h1>PONG</h1>
            </div>
            <div class="score-container">
                <div class="score-box">
                    <span class="score-label">PLAYER</span>
                    <span id="player-score">0</span>
                </div>
                <div class="score-box">
                    <span class="score-label">AI</span>
                    <span id="ai-score">0</span>
                </div>
            </div>
        </div>

        <div class="game-board-container">
            <div id="game-message" class="game-message">
                <p id="message-text">Press Space or Tap to Start</p>
            </div>
            <canvas id="pongCanvas" width="800" height="400"></canvas>
        </div>

        <div class="instructions">
            <p>Controls: Move mouse/finger up and down to clear paddle.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
