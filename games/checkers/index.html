<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkers - FOSSarium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="game-body">
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>
    <div class="app-container game-container-wrapper"><a href="../../index.html" class="back-button">&larr; Back to
            FOSSarium</a>
        <div class="game-header">
            <h1>Checkers</h1>
            <p class="turn">Turn: <span id="turn" style="color:#ff4757">Red</span></p>
        </div>
        <div class="board" id="board"></div><button id="reset-btn" class="action-btn primary">New Game</button>
    </div>
    <script src="script.js"></script>
</body>

</html>
