<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timestamp Converter - FOSSarium</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <!-- Ionicons for beautiful icons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body class="game-body">
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>

    <div class="theme-toggle-container">
        <button id="theme-toggle" title="Toggle Light/Dark Theme">
            <ion-icon name="sunny-outline"></ion-icon>
        </button>
    </div>

    <div class="app-container tool-container-wrapper">
        <div class="tool-header">
            <h1>Timestamp Converter</h1>
            <p class="tool-subtitle">Convert between Unix timestamps and dates.</p>
        </div>
        <div class="now-box">Now: <span id="now"></span></div>
        <div class="section"><label>Unix Timestamp (seconds)</label><input type="number" id="ts"
                placeholder="1700000000"><button onclick="tsToDate()" class="sm-btn">→ Convert to Date</button>
            <div id="ts-result" class="result-box"></div>
        </div>
        <div class="section"><label>Date String</label><input type="datetime-local" id="dt"><button onclick="dateToTs()"
                class="sm-btn">→ Convert to Timestamp</button>
            <div id="dt-result" class="result-box"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
