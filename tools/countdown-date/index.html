<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown to Date - FOSSarium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body>
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="theme-toggle-container">
        <button id="theme-toggle" title="Toggle Light/Dark Theme">
            <ion-icon name="sunny-outline"></ion-icon>
        </button>
    </div>

    <div class="app-container tool-container-wrapper">
        <div class="tool-header">
            <h1>Countdown</h1>
            <p class="tool-subtitle">Track the remaining time until your next big event or milestone.</p>
        </div>

        <div class="tool-card">
            <div class="input-section">
                <div class="field">
                    <label for="target">Target Date & Time</label>
                    <input type="datetime-local" id="target">
                </div>
            </div>

            <div class="countdown-display" id="result">
                <!-- Countdown generated by script.js -->
                <div class="time-block">
                    <span class="value">00</span>
                    <span class="label">Days</span>
                </div>
                <div class="time-block">
                    <span class="value">00</span>
                    <span class="label">Hours</span>
                </div>
                <div class="time-block">
                    <span class="value">00</span>
                    <span class="label">Mins</span>
                </div>
                <div class="time-block">
                    <span class="value">00</span>
                    <span class="label">Secs</span>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
