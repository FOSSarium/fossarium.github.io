<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown to Date - FOSSarium</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <!-- Ionicons -->
    <script type="module" src="/assets/icons/ionicons.esm.js"></script>
    <script nomodule src="/assets/icons/ionicons.js"></script>
</head>

<body>
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="theme-toggle-container">
        <button id="theme-toggle" title="Toggle Light/Dark Theme">
            <ion-icon name="sunny-outline"></ion-icon>
        </button>
    </div>

    <div class="app-container tool-container-wrapper">
        <div class="tool-header">
            <h1>Countdown</h1>
            <p class="tool-subtitle">Track the remaining time until your next big event or milestone.</p>
        </div>

        <div class="tool-card">
            <div class="input-section">
                <div class="field">
                    <label for="target">Target Date & Time</label>
                    <input type="datetime-local" id="target">
                </div>
                <button id="start-btn" class="btn primary-btn">
                    <ion-icon name="play-outline"></ion-icon> Start Countdown
                </button>
            </div>

            <div class="countdown-display" id="result">
                <div class="passed-message">Select a date and press Start</div>
            </div>
        </div>
    </div>
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal-card">
            <ion-icon name="trophy-outline" class="modal-icon"></ion-icon>
            <h2>Target Reached!</h2>
            <p>The countdown has finished. The moment you were waiting for is here!</p>
            <button id="modal-ok" class="btn primary-btn modal-btn">OK</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
