<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker - FOSSarium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>
    <script>const s=localStorage.getItem('fossarium-theme');if(s==='light'||(!s&&window.matchMedia('(prefers-color-scheme: light)').matches))document.documentElement.classList.add('light-theme');</script>
    <div class="background-blobs"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>
    <div class="theme-toggle-container"><button id="theme-toggle" title="Toggle Theme"><ion-icon name="sunny-outline"></ion-icon></button></div>
    <div class="app-container tool-container-wrapper">
        <div class="tool-header"><h1>Habit Tracker</h1><p class="tool-subtitle">Build good habits by tracking your daily progress and streaks.</p></div>
        <div class="tool-card">
            <div class="add-habit-form">
                <input type="text" id="habit-input" placeholder="Add a new habit (e.g., Read for 15 mins)">
                <button id="add-habit-btn" class="btn primary-btn"><ion-icon name="add-outline"></ion-icon> Add</button>
            </div>
            <div id="habits-list"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
