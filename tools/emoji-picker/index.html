<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Picker - FOSSarium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body>
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="theme-toggle-container">
        <button id="theme-toggle" title="Toggle Light/Dark Theme">
            <ion-icon name="sunny-outline"></ion-icon>
        </button>
    </div>

    <div class="app-container tool-container-wrapper">
        <div class="tool-header">
            <h1>Emoji Picker</h1>
            <p class="tool-subtitle">A quick and easy way to find and copy your favorite emojis for any project.</p>
        </div>

        <div class="tool-card">
            <div class="search-section">
                <div class="search-box">
                    <ion-icon name="search-outline"></ion-icon>
                    <input type="text" id="search" placeholder="Search emojis by name...">
                </div>
            </div>

            <div class="categories-tab" id="category-tabs">
                <button class="category-btn active" data-category="all">All</button>
                <button class="category-btn" data-category="smileys">Smileys</button>
                <button class="category-btn" data-category="animals">Animals</button>
                <button class="category-btn" data-category="food">Food</button>
                <button class="category-btn" data-category="activities">Activities</button>
                <button class="category-btn" data-category="objects">Objects</button>
                <button class="category-btn" data-category="symbols">Symbols</button>
            </div>

            <div class="emoji-grid" id="grid">
                <!-- Emojis generated by script.js -->
            </div>

            <div class="hint-text">
                <ion-icon name="information-circle-outline"></ion-icon>
                Click any emoji to copy it to your clipboard.
            </div>
        </div>
    </div>

    <div class="copied-badge" id="copied-badge">
        <ion-icon name="checkmark-circle-outline"></ion-icon>
        Copied to clipboard!
    </div>

    <script src="script.js"></script>
</body>

</html>
