<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decision Wheel - FOSSarium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body>
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="theme-toggle-container">
        <button id="theme-toggle" title="Toggle Light/Dark Theme">
            <ion-icon name="sunny-outline"></ion-icon>
        </button>
    </div>

    <div class="app-container tool-container-wrapper">
        <div class="tool-header">
            <h1>Decision Wheel</h1>
            <p class="tool-subtitle">Leave it to fate! Enter your choices and let the wheel decide for you.</p>
        </div>

        <div class="tool-card">
            <div class="wheel-section">
                <canvas id="wheel" width="320" height="320"></canvas>
                <div class="wheel-pointer"></div>
            </div>

            <div class="editor-section">
                <div class="field">
                    <label for="options">Options (one per line)</label>
                    <textarea id="options" placeholder="Enter choices...">Yes&#10;No&#10;Maybe&#10;Definitely&#10;Try Again</textarea>
                </div>
                
                <div class="result-area" id="result-box" style="display: none;">
                    <div class="result-label">The Wheel Decided:</div>
                    <div class="result-text" id="result"></div>
                </div>

                <div class="btn-group">
                    <button id="spin-btn" class="btn primary-btn">
                        <ion-icon name="sync-outline"></ion-icon> Spin the Wheel
                    </button>
                    <button id="shuffle-btn" class="btn secondary-btn">
                        <ion-icon name="color-palette-outline"></ion-icon> Shuffle Colors
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
