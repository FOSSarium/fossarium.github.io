<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aspect Ratio Calculator - FOSSarium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body>
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="theme-toggle-container">
        <button id="theme-toggle" title="Toggle Light/Dark Theme">
            <ion-icon name="sunny-outline"></ion-icon>
        </button>
    </div>

    <div class="app-container tool-container-wrapper">
        <div class="tool-header">
            <h1>Aspect Ratio</h1>
            <p class="tool-subtitle">Maintain perfect proportions across any resolution with live visual feedback.</p>
        </div>

        <div class="ratio-layout">
            <div class="tool-card settings-pane">
                <div class="section-title">Original (Base)</div>
                <div class="input-pair">
                    <div class="field">
                        <label>Width</label>
                        <input type="number" id="w1" value="1920">
                    </div>
                    <div class="field">
                        <label>Height</label>
                        <input type="number" id="h1" value="1080">
                    </div>
                </div>

                <div class="ratio-result" id="ratio-display">16:9</div>

                <div class="section-title">Scaled Target</div>
                <div class="input-pair">
                    <div class="field">
                        <label>New Width</label>
                        <input type="number" id="w2" value="1280">
                    </div>
                    <div class="field">
                        <label>New Height</label>
                        <input type="number" id="h2" readonly>
                    </div>
                </div>

                <div class="presets-section">
                    <label>Common Presets</label>
                    <div class="presets-grid">
                        <button class="preset-btn" data-w="16" data-h="9">16:9</button>
                        <button class="preset-btn" data-w="4" data-h="3">4:3</button>
                        <button class="preset-btn" data-w="1" data-h="1">1:1</button>
                        <button class="preset-btn" data-w="21" data-h="9">21:9</button>
                        <button class="preset-btn" data-w="9" data-h="16">9:16</button>
                    </div>
                </div>
            </div>

            <div class="preview-pane">
                <div class="preview-card">
                    <label>Visual Proportion</label>
                    <div class="visual-container">
                        <div id="preview-box" class="aspect-box">
                            <span id="box-label">1920 × 1080</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
