<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aspect Ratio Calculator - FOSSarium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <!-- Ionicons for beautiful icons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body>
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="theme-toggle-container">
        <button id="theme-toggle" title="Toggle Light/Dark Theme">
            <ion-icon name="sunny-outline"></ion-icon>
        </button>
    </div>

    <div class="app-container tool-container-wrapper">
        <div class="tool-header">
            <h1>Aspect Ratio</h1>
            <p class="tool-subtitle">Calculate, convert, and maintain perfect dimensions instantly.</p>
        </div>

        <div class="card">
            <div class="section-title">Original Dimensions</div>
            <div class="converter-grid">
                <div class="field">
                    <label>Width (px)</label>
                    <input type="number" id="w1" value="1920">
                </div>
                <div class="field">
                    <label>Height (px)</label>
                    <input type="number" id="h1" value="1080">
                </div>
            </div>

            <div class="result" id="result">Ratio: 16:9</div>

            <div class="section-title">Scale Converter</div>
            <div class="converter-grid">
                <div class="field">
                    <label>New Width</label>
                    <input type="number" id="w2" value="1280">
                </div>
                <div class="field">
                    <label>New Height (Auto)</label>
                    <input type="number" id="h2" readonly>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
