<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XML Formatter - FOSSarium</title>
    <meta name="description" content="Validate and prettify XML documents with indentation options.">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="/assets/icons/ionicons.esm.js"></script>
    <script nomodule src="/assets/icons/ionicons.js"></script>
</head>

<body>
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="theme-toggle-container">
        <button id="theme-toggle" title="Toggle Light/Dark Theme">
            <ion-icon name="sunny-outline"></ion-icon>
        </button>
    </div>

    <div class="app-container tool-container-wrapper">
        <div class="tool-header">
            <h1>XML Formatter</h1>
            <p class="tool-subtitle">Validate and prettify XML documents with customizable indentation.</p>
        </div>

        <div class="tool-card">
            <div class="settings-bar">
                <div class="setting-group">
                    <label>Indentation</label>
                    <select id="indent-select">
                        <option value="2">2 Spaces</option>
                        <option value="4">4 Spaces</option>
                        <option value="tab">Tabs</option>
                    </select>
                </div>
                <div class="action-group">
                    <button id="format-btn" class="action-btn primary">
                        <ion-icon name="code-outline"></ion-icon> Format
                    </button>
                    <button id="minify-btn" class="action-btn secondary">
                        <ion-icon name="contract-outline"></ion-icon> Minify
                    </button>
                </div>
            </div>

            <div class="editor-layout">
                <div class="editor-pane">
                    <div class="pane-header">
                        <label>Input XML</label>
                        <button class="icon-btn" id="clear-btn" title="Clear">
                            <ion-icon name="trash-outline"></ion-icon>
                        </button>
                    </div>
                    <textarea id="input" placeholder='<root>&#10;  <item id="1">Hello</item>&#10;  <item id="2">World</item>&#10;</root>'></textarea>
                </div>
                <div class="editor-pane">
                    <div class="pane-header">
                        <label>Formatted Output</label>
                        <div class="header-actions">
                            <button class="icon-btn" id="copy-btn" title="Copy">
                                <ion-icon name="copy-outline"></ion-icon>
                            </button>
                            <button class="icon-btn" id="download-btn" title="Download">
                                <ion-icon name="download-outline"></ion-icon>
                            </button>
                        </div>
                    </div>
                    <textarea id="output" readonly placeholder="Formatted XML will appear here..."></textarea>
                </div>
            </div>

            <div id="error-bar" class="error-bar hidden">
                <ion-icon name="alert-circle-outline"></ion-icon>
                <span id="error-msg"></span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
