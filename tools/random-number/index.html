<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Number Generator - FOSSarium</title>
    <meta name="description" content="Generate random numbers within any range with history and statistics.">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="/assets/icons/ionicons.esm.js"></script>
    <script nomodule src="/assets/icons/ionicons.js"></script>
</head>

<body>
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="theme-toggle-container">
        <button id="theme-toggle" title="Toggle Light/Dark Theme">
            <ion-icon name="sunny-outline"></ion-icon>
        </button>
    </div>

    <div class="app-container tool-container-wrapper">
        <div class="tool-header">
            <h1>Random Number</h1>
            <p class="tool-subtitle">Generate cryptographically secure random numbers in any range.</p>
        </div>

        <div class="tool-card">
            <div class="result-display" id="result-display">
                <span class="result-number" id="result-number">—</span>
            </div>

            <div class="range-row">
                <div class="range-field">
                    <label for="min-val">Min</label>
                    <input type="number" id="min-val" value="1">
                </div>
                <span class="range-sep">to</span>
                <div class="range-field">
                    <label for="max-val">Max</label>
                    <input type="number" id="max-val" value="100">
                </div>
            </div>

            <div class="options-row">
                <div class="option-group">
                    <label for="qty">Quantity</label>
                    <input type="number" id="qty" value="1" min="1" max="100">
                </div>
                <div class="option-group">
                    <label class="check-label">
                        <input type="checkbox" id="unique-check"> Unique only
                    </label>
                </div>
                <div class="option-group">
                    <label class="check-label">
                        <input type="checkbox" id="integer-check" checked> Integers
                    </label>
                </div>
            </div>

            <button id="generate-btn" class="generate-btn">
                <ion-icon name="dice-outline"></ion-icon> Generate
            </button>

            <div class="multi-results hidden" id="multi-results">
                <h3><ion-icon name="list-outline"></ion-icon> Results</h3>
                <div class="results-grid" id="results-grid"></div>
                <button class="copy-all-btn" id="copy-all">
                    <ion-icon name="copy-outline"></ion-icon> Copy All
                </button>
            </div>

            <div class="history-section hidden" id="history-section">
                <h3><ion-icon name="time-outline"></ion-icon> History</h3>
                <div class="history-list" id="history-list"></div>
                <button class="clear-btn" id="clear-history">
                    <ion-icon name="trash-outline"></ion-icon> Clear
                </button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden">
        <ion-icon name="checkmark-circle"></ion-icon>
        <span id="toast-message">Copied!</span>
    </div>

    <script src="script.js"></script>
</body>

</html>
