<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortgage Calculator - FOSSarium</title>
    <meta name="description" content="Calculate monthly mortgage payments, total interest, and see the full amortization breakdown.">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="/assets/icons/ionicons.esm.js"></script>
    <script nomodule src="/assets/icons/ionicons.js"></script>
</head>

<body>
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="theme-toggle-container">
        <button id="theme-toggle" title="Toggle Light/Dark Theme">
            <ion-icon name="sunny-outline"></ion-icon>
        </button>
    </div>

    <div class="app-container tool-container-wrapper">
        <div class="tool-header">
            <h1>Mortgage Calculator</h1>
            <p class="tool-subtitle">Estimate monthly payments, total interest, and view an amortization breakdown.</p>
        </div>

        <div class="calc-layout">
            <div class="input-panel">
                <div class="input-group">
                    <label for="price">Home Price</label>
                    <div class="input-with-prefix">
                        <span class="prefix">$</span>
                        <input type="number" id="price" value="300000" min="0" step="1000">
                    </div>
                    <input type="range" id="price-slider" min="50000" max="2000000" value="300000" step="5000" class="calc-slider">
                </div>

                <div class="input-group">
                    <label for="down">Down Payment</label>
                    <div class="input-with-prefix">
                        <span class="prefix">$</span>
                        <input type="number" id="down" value="60000" min="0" step="1000">
                    </div>
                    <input type="range" id="down-slider" min="0" max="500000" value="60000" step="1000" class="calc-slider">
                </div>

                <div class="input-group">
                    <label for="rate">Interest Rate</label>
                    <div class="input-with-prefix">
                        <input type="number" id="rate" value="6.5" min="0" max="30" step="0.1">
                        <span class="suffix">%</span>
                    </div>
                    <input type="range" id="rate-slider" min="0" max="15" value="6.5" step="0.1" class="calc-slider">
                </div>

                <div class="input-group">
                    <label for="term">Loan Term</label>
                    <div class="term-selector">
                        <button class="term-btn" data-term="10">10 yr</button>
                        <button class="term-btn" data-term="15">15 yr</button>
                        <button class="term-btn" data-term="20">20 yr</button>
                        <button class="term-btn active" data-term="30">30 yr</button>
                    </div>
                </div>
            </div>

            <div class="results-panel">
                <div class="result-card primary-result">
                    <div class="result-label">Monthly Payment</div>
                    <div class="result-value" id="monthly">$0</div>
                </div>

                <div class="result-grid">
                    <div class="result-card">
                        <div class="result-label">Loan Amount</div>
                        <div class="result-value small" id="loan-amount">$0</div>
                    </div>
                    <div class="result-card">
                        <div class="result-label">Total Interest</div>
                        <div class="result-value small" id="total-interest">$0</div>
                    </div>
                    <div class="result-card">
                        <div class="result-label">Total Cost</div>
                        <div class="result-value small" id="total-cost">$0</div>
                    </div>
                    <div class="result-card">
                        <div class="result-label">Down Payment %</div>
                        <div class="result-value small" id="down-pct">0%</div>
                    </div>
                </div>

                <div class="cost-bar">
                    <div class="bar-principal" id="bar-principal" style="width: 50%"></div>
                    <div class="bar-interest" id="bar-interest" style="width: 50%"></div>
                </div>
                <div class="cost-bar-legend">
                    <span class="legend-item"><span class="dot principal"></span> Principal</span>
                    <span class="legend-item"><span class="dot interest"></span> Interest</span>
                </div>
            </div>
        </div>

        <div class="amort-section" id="amort-section">
            <div class="amort-header">
                <h3><ion-icon name="analytics-outline"></ion-icon> Amortization Schedule</h3>
                <button id="toggle-amort" class="action-btn secondary">
                    <ion-icon name="chevron-down-outline" id="amort-icon"></ion-icon> Show
                </button>
            </div>
            <div class="amort-table-wrapper hidden" id="amort-table">
                <table>
                    <thead>
                        <tr>
                            <th>Year</th>
                            <th>Principal</th>
                            <th>Interest</th>
                            <th>Balance</th>
                        </tr>
                    </thead>
                    <tbody id="amort-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
