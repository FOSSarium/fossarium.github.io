<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortgage Calculator - FOSSarium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <!-- Ionicons for beautiful icons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body class="game-body">
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>

    <div class="theme-toggle-container">
        <button id="theme-toggle" title="Toggle Light/Dark Theme">
            <ion-icon name="sunny-outline"></ion-icon>
        </button>
    </div>

    <div class="app-container tool-container-wrapper">
        <div class="tool-header">
            <h1>Mortgage Calculator</h1>
            <p class="tool-subtitle">Calculate monthly payments and total cost.</p>
        </div>
        <div class="form"><label>Home Price ($)</label><input type="number" id="price" value="300000"><label>Down
                Payment ($)</label><input type="number" id="down" value="60000"><label>Interest Rate (%)</label><input
                type="number" id="rate" value="6.5" step="0.1"><label>Loan Term (years)</label><input type="number"
                id="term" value="30"><button id="calc-btn" class="action-btn primary">Calculate</button></div>
        <div class="results" id="results"></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
