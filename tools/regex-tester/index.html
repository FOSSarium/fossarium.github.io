<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regex Tester - FOSSarium</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <!-- Ionicons for beautiful icons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body class="game-body">
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>

    <div class="theme-toggle-container">
        <button id="theme-toggle" title="Toggle Light/Dark Theme">
            <ion-icon name="sunny-outline"></ion-icon>
        </button>
    </div>

    <div class="app-container tool-container-wrapper">
        <div class="tool-header">
            <h1>Regex Tester</h1>
            <p class="tool-subtitle">Test regular expressions against text in real-time.</p>
        </div>
        <div class="regex-input-row"><span class="regex-slash">/</span><input type="text" id="regex-input"
                placeholder="your regex here"><span class="regex-slash">/</span><input type="text" id="flags-input"
                value="g" class="flags-input"></div>
        <div id="status" class="status-bar hidden"></div>
        <div class="editor-pane"><label>Test String</label><textarea id="test-input"
                placeholder="Enter test text..."></textarea></div>
        <div class="matches-section">
            <h3>Matches (<span id="match-count">0</span>)</h3>
            <div id="matches-output" class="matches-output"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
