<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator - FOSSarium</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <!-- Ionicons for beautiful icons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body>
    <script>
        const s = localStorage.getItem("fossarium-theme");
        if (s === "light" || (!s && window.matchMedia("(prefers-color-scheme: light)").matches)) {
            document.documentElement.classList.add("light-theme");
        }
    </script>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="theme-toggle-container">
        <button id="theme-toggle" title="Toggle Light/Dark Theme">
            <ion-icon name="sunny-outline"></ion-icon>
        </button>
    </div>

    <div class="app-container tool-container-wrapper">
        <div class="tool-header">
            <h1>Age Calculator</h1>
            <p class="tool-subtitle">Calculate exact age and discover more about your birth date.</p>
        </div>
        <div class="input-grid">
            <div>
                <label for="dob">Your Birth Date</label>
                <input type="date" id="dob">
            </div>
        </div>
        <div class="result-box" id="result" style="display: none;">
            <div id="age-primary" class="age-primary"></div>
            <div id="age-secondary" class="age-secondary"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
