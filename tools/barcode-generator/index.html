<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcode Generator - FOSSarium</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="/assets/icons/ionicons.esm.js"></script>
    <script nomodule src="/assets/icons/ionicons.js"></script>
</head>

<body>
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="theme-toggle-container">
        <button id="theme-toggle" title="Toggle Light/Dark Theme">
            <ion-icon name="sunny-outline"></ion-icon>
        </button>
    </div>

    <div class="app-container tool-container-wrapper">
        <div class="tool-header">
            <h1>Barcode Generator</h1>
            <p class="tool-subtitle">Generate high-quality barcodes for any text or numerical data instantly.</p>
        </div>

        <div class="tool-card">
            <div class="input-section">
                <div class="field">
                    <label for="input">Data to Encode</label>
                    <input type="text" id="input" placeholder="Enter text or numbers..." value="FOSSarium">
                    <div id="error-msg" class="error-message"></div>
                </div>

                <div class="options-grid">
                    <div class="field">
                        <label for="bar-width">Bar Width</label>
                        <select id="bar-width">
                            <option value="1">Thin</option>
                            <option value="2" selected>Medium</option>
                            <option value="3">Thick</option>
                            <option value="4">Extra Thick</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="bar-height">Height</label>
                        <input type="range" id="bar-height" min="40" max="150" value="80" style="margin-block: auto;">
                    </div>
                </div>
            </div>

            <div class="barcode-preview-area" id="preview-area">
                <div class="barcode-container" id="barcode-container">
                    <canvas id="canvas"></canvas>
                </div>

                <div class="action-row">
                    <button id="download-png" class="btn primary-btn">
                        <ion-icon name="download-outline"></ion-icon> Download PNG
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
