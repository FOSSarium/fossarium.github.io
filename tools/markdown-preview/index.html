<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Previewer - FOSSarium</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
</head>

<body class="game-body">
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>

    <div class="theme-toggle-container">
        <button id="theme-toggle" title="Toggle Light/Dark Theme">
            <ion-icon name="sunny-outline"></ion-icon>
        </button>
    </div>

    <div class="app-container tool-container-wrapper">
        <div class="tool-header">
            <h1>Markdown Previewer</h1>
            <p class="tool-subtitle">Write Markdown, see live HTML preview.</p>
        </div>
        <div class="editor-layout">
            <div class="editor-pane"><label>Markdown</label><textarea id="input" placeholder="# Hello World">## Hello FOSSarium

This is **bold** and *italic* text.

- Item 1
- Item 2
- Item 3

> A blockquote example

`inline code` and a [link](https://example.com)

```
code block
```</textarea></div>
            <div class="editor-pane preview-pane"><label>Preview</label>
                <div id="output" class="preview"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
