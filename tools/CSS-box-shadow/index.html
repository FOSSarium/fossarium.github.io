<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Box Shadow Generator - FOSSarium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body>
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="theme-toggle-container">
        <button id="theme-toggle" title="Toggle Light/Dark Theme">
            <ion-icon name="sunny-outline"></ion-icon>
        </button>
    </div>

    <div class="app-container tool-container-wrapper">
        <div class="tool-header">
            <h1>Box Shadow</h1>
            <p class="tool-subtitle">Design perfect shadows with real-time visual feedback and CSS export.</p>
        </div>

        <div class="tool-card">
            <div class="editor-grid">
                <div class="controls-pane">
                    <div class="tabs">
                        <button class="tab-btn active" data-tab="shadows">Shadow Layers</button>
                        <button class="tab-btn" data-tab="box">Box & Background</button>
                    </div>

                    <div class="tab-content" id="shadows-tab">
                        <div id="layers-list">
                            <!-- Layers will be dynamically added here -->
                        </div>
                        <button id="add-layer" class="secondary-btn">
                            <ion-icon name="add-outline"></ion-icon> Add Layer
                        </button>
                    </div>

                    <div class="tab-content hidden" id="box-tab">
                        <div class="field-group">
                            <label>Box Color</label>
                            <input type="color" id="box-color" value="#58a6ff">
                        </div>
                        <div class="field-group">
                            <label>Border Radius: <span id="br-val">16</span>px</label>
                            <input type="range" id="border-radius" min="0" max="100" value="16">
                        </div>
                        <div class="field-group">
                            <label>Container BG</label>
                            <input type="color" id="bg-color-picker" value="#0a0a1a">
                        </div>
                    </div>

                    <div class="field-group presets-group">
                        <label>Presets</label>
                        <div class="presets-grid">
                            <button class="preset-btn" data-preset="soft">Soft</button>
                            <button class="preset-btn" data-preset="hard">Hard</button>
                            <button class="preset-btn" data-preset="neon">Neon</button>
                            <button class="preset-btn" data-preset="inner">Inner</button>
                            <button class="preset-btn" data-preset="multi">Multi</button>
                        </div>
                    </div>
                </div>

                <div class="preview-pane-container">
                    <div class="preview-pane" id="preview-pane">
                        <div class="preview-box" id="preview-box"></div>
                    </div>
                </div>
            </div>

            <div class="code-section">
                <div class="code-box">
                    <code id="css-output">box-shadow: 5px 5px 15px 0px rgba(0,0,0,0.4);</code>
                    <button class="copy-btn" id="copy-btn" title="Copy to clipboard">
                        <ion-icon name="copy-outline"></ion-icon>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
