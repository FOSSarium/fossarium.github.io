<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Picker - FOSSarium</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <!-- Ionicons -->
    <script type="module" src="/assets/icons/ionicons.esm.js"></script>
    <script nomodule src="/assets/icons/ionicons.js"></script>
</head>

<body>
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="theme-toggle-container">
        <button id="theme-toggle" title="Toggle Light/Dark Theme">
            <ion-icon name="sunny-outline"></ion-icon>
        </button>
    </div>

    <div class="app-container tool-container-wrapper">
        <div class="tool-header">
            <h1>Color Picker</h1>
            <p class="tool-subtitle">Select any color and instantly get CSS-ready formats for your project.</p>
        </div>

        <div class="tool-card">
            <div class="picker-section">
                <div class="preview-area">
                    <div class="color-preview" id="preview"></div>
                    <input type="color" id="picker" value="#58a6ff">
                </div>
            </div>

            <div class="formats-list" id="formats">
                <!-- Color formats generated by script.js -->
            </div>

            <div class="hint-text">
                <ion-icon name="information-circle-outline"></ion-icon>
                Click any format to copy its value.
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
