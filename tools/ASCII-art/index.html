<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Art Generator - FOSSarium</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <!-- Ionicons -->
    <script type="module" src="/assets/icons/ionicons.esm.js"></script>
    <script nomodule src="/assets/icons/ionicons.js"></script>
</head>

<body>
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="theme-toggle-container">
        <button id="theme-toggle" title="Toggle Light/Dark Theme">
            <ion-icon name="sunny-outline"></ion-icon>
        </button>
    </div>

    <div class="app-container tool-container-wrapper">
        <div class="tool-header">
            <h1>ASCII Art</h1>
            <p class="tool-subtitle">Design professional text banners with multiple ASCII font styles.</p>
        </div>

        <div class="ascii-layout">
            <div class="tool-card settings-card">
                <div class="field">
                    <label>Input Text</label>
                    <input type="text" id="text-input" placeholder="Type here..." value="FOSS">
                </div>

                <div class="field">
                    <label>Font Style</label>
                    <select id="font-select">
                        <option value="block">Block (Heavy)</option>
                        <option value="thin">Thin (Minimal)</option>
                        <option value="rounded">Rounded (Soft)</option>
                        <option value="digital">Digital (Clock)</option>
                    </select>
                </div>

                <div class="field">
                    <label>Fill Character</label>
                    <div class="char-presets">
                        <button class="char-btn active" data-char="#">#</button>
                        <button class="char-btn" data-char="@">@</button>
                        <button class="char-btn" data-char="*">*</button>
                        <button class="char-btn" data-char="0">0</button>
                        <button class="char-btn" data-char="+">+</button>
                    </div>
                </div>

                <button id="copy-btn" class="btn primary-btn">
                    <ion-icon name="copy-outline"></ion-icon> Copy ASCII Art
                </button>
            </div>

            <div class="output-section">
                <div class="output-container">
                    <pre id="output"></pre>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
