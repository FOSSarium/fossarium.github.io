<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator - Spectrum</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>

<body class="game-body">
    <script>
        const savedTheme = localStorage.getItem('spectrum-theme');
        if (savedTheme === 'light' || (!savedTheme && window.matchMedia('(prefers-color-scheme: light)').matches)) {
            document.documentElement.classList.add('light-theme');
        }
    </script>
    <div class="app-container tool-container-wrapper">
        <a href="../../index.html" class="back-button">&larr; Back to Spectrum</a>
        <div class="tool-header">
            <h1>QR Code Generator</h1>
            <p class="tool-subtitle">Create QR codes from text or URLs.</p>
        </div>
        <div class="input-group">
            <input type="text" id="qr-input" placeholder="Enter text or URL...">
            <button id="generate-btn" class="action-btn primary"><ion-icon name="qr-code-outline"></ion-icon>
                Generate</button>
        </div>
        <div class="qr-display" id="qr-display"></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
