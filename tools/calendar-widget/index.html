<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar Widget - FOSSarium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body>
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="theme-toggle-container">
        <button id="theme-toggle" title="Toggle Light/Dark Theme">
            <ion-icon name="sunny-outline"></ion-icon>
        </button>
    </div>

    <div class="app-container tool-container-wrapper">
        <div class="tool-header">
            <h1>Calendar</h1>
            <p class="tool-subtitle">A clean, functional widget to stay organized and track your schedule.</p>
        </div>

        <div class="calendar-card">
            <div class="cal-nav">
                <button class="nav-btn" id="prev-btn">
                    <ion-icon name="chevron-back-outline"></ion-icon>
                </button>
                <h2 id="month-title">March 2026</h2>
                <button class="nav-btn" id="next-btn">
                    <ion-icon name="chevron-forward-outline"></ion-icon>
                </button>
            </div>

            <div class="cal-grid" id="cal-grid">
                <!-- Calendar content generated by script.js -->
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
