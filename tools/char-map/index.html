<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Map - FOSSarium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body>
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="theme-toggle-container">
        <button id="theme-toggle" title="Toggle Light/Dark Theme">
            <ion-icon name="sunny-outline"></ion-icon>
        </button>
    </div>

    <div class="app-container tool-container-wrapper">
        <div class="tool-header">
            <h1>Character Map</h1>
            <p class="tool-subtitle">Explore and copy unique symbols, arrows, and emojis for your projects.</p>
        </div>

        <div class="tool-card">
            <div class="input-section">
                <div class="field">
                    <label for="category">Category</label>
                    <select id="category">
                        <option value="arrows">Arrows</option>
                        <option value="math">Mathematics</option>
                        <option value="currency">Currency</option>
                        <option value="box">Box Drawing</option>
                        <option value="emoji">Basic Emojis</option>
                    </select>
                </div>
            </div>

            <div class="char-grid" id="grid">
                <!-- Characters generated by script.js -->
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
