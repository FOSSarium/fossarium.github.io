<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cron Parser - FOSSarium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body>
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="theme-toggle-container">
        <button id="theme-toggle" title="Toggle Light/Dark Theme">
            <ion-icon name="sunny-outline"></ion-icon>
        </button>
    </div>

    <div class="app-container tool-container-wrapper">
        <div class="tool-header">
            <h1>Cron Parser</h1>
            <p class="tool-subtitle">Instantly translate complex cron expressions into simple, human-readable text.</p>
        </div>

        <div class="tool-card">
            <div class="input-section">
                <div class="field">
                    <label for="cron">Cron Expression</label>
                    <input type="text" id="cron" class="cron-input" value="*/5 * * * *" placeholder="* * * * *">
                </div>
            </div>

            <div class="fields-grid" id="fields">
                <!-- Field components generated by script.js -->
            </div>

            <div class="result-area">
                <div class="result-label">Human Readable Interpretation</div>
                <div class="result-text" id="result">Every 5 minutes</div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
