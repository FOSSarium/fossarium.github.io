<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chmod Calculator - FOSSarium</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="game-body">
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>
    <div class="app-container tool-container-wrapper"><a href="../../index.html" class="back-button">&larr; Back to
            FOSSarium</a>
        <div class="tool-header">
            <h1>Chmod Calculator</h1>
            <p class="tool-subtitle">Set Unix file permissions visually.</p>
        </div>
        <div class="numeric"><span class="big" id="octal">755</span><span class="sym" id="symbolic">rwxr-xr-x</span>
        </div>
        <div class="perm-grid" id="grid"></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
