<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWT Decoder - FOSSarium</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <!-- Ionicons for beautiful icons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body class="game-body">
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>

    <div class="theme-toggle-container">
        <button id="theme-toggle" title="Toggle Light/Dark Theme">
            <ion-icon name="sunny-outline"></ion-icon>
        </button>
    </div>

    <div class="app-container tool-container-wrapper">
        
        <div class="tool-header">
            <h1>JWT Decoder</h1>
            <p class="tool-subtitle">Decode JSON Web Tokens locally and securely.</p>
        </div>
        <div class="input-group"><label>Paste JWT</label><textarea id="jwt-input"
                placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."></textarea></div>
        <div class="decoded-sections">
            <div class="section">
                <h3>Header</h3>
                <pre id="header-output">{}</pre>
            </div>
            <div class="section">
                <h3>Payload</h3>
                <pre id="payload-output">{}</pre>
            </div>
        </div>
        <div id="status" class="status-bar hidden"></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
