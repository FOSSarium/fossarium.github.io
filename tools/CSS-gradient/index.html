<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Gradient Generator - FOSSarium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body>
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="theme-toggle-container">
        <button id="theme-toggle" title="Toggle Light/Dark Theme">
            <ion-icon name="sunny-outline"></ion-icon>
        </button>
    </div>

    <div class="app-container tool-container-wrapper">
        <div class="tool-header">
            <h1>Gradient Designer</h1>
            <p class="tool-subtitle">Create complex multi-stop gradients with real-time visual feedback.</p>
        </div>

        <div class="tool-card main-editor">
            <div class="editor-grid">
                <div class="controls-pane">
                    <div class="field-group">
                        <label>Gradient Type</label>
                        <div class="type-selector">
                            <button class="type-btn active" data-type="linear">Linear</button>
                            <button class="type-btn" data-type="radial">Radial</button>
                        </div>
                    </div>

                    <div id="linear-controls">
                        <div class="field-group">
                            <label>Angle: <span id="angle-val">135</span>°</label>
                            <input type="range" id="angle" min="0" max="360" value="135">
                        </div>
                    </div>

                    <div class="field-group">
                        <label>Color Stops</label>
                        <div id="stops-container">
                            <!-- Stops will be added here -->
                        </div>
                        <button id="add-stop" class="secondary-btn">
                            <ion-icon name="add-outline"></ion-icon> Add Color Stop
                        </button>
                    </div>

                    <div class="field-group presets-group">
                        <label>Presets</label>
                        <div class="presets-grid" id="presets-grid">
                            <!-- Presets will be added here -->
                        </div>
                    </div>
                </div>

                <div class="preview-pane-container">
                    <div class="preview-pane" id="preview-display">
                        <div class="preview-box" id="preview-box"></div>
                    </div>
                </div>
            </div>

            <div class="code-section">
                <div class="code-box">
                    <code id="css-output">background: linear-gradient(135deg, #7F00FF 0%, #E100FF 100%);</code>
                    <button class="copy-btn" id="copy-btn" title="Copy to clipboard">
                        <ion-icon name="copy-outline"></ion-icon>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
