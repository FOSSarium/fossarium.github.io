<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Parser - FOSSarium</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <!-- Ionicons for beautiful icons -->
    <script type="module" src="/assets/icons/ionicons.esm.js"></script>
    <script nomodule src="/assets/icons/ionicons.js"></script>
</head>

<body class="game-body">
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>

    <div class="theme-toggle-container">
        <button id="theme-toggle" title="Toggle Light/Dark Theme">
            <ion-icon name="sunny-outline"></ion-icon>
        </button>
    </div>

    <div class="app-container tool-container-wrapper">
        <div class="tool-header">
            <h1>URL Parser</h1>
            <p class="tool-subtitle">Extract components from a URL string.</p>
        </div><input type="text" id="url-input" class="url-input"
            placeholder="https://example.com:8080/path?key=value#hash"
            value="https://example.com:8080/path/to/page?name=John&age=25#section">
        <div class="parts-grid" id="parts"></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
