<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Speed Test - FOSSarium</title>
    <meta name="description" content="Test your typing speed and accuracy with live WPM feedback.">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="/assets/icons/ionicons.esm.js"></script>
    <script nomodule src="/assets/icons/ionicons.js"></script>
</head>

<body>
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="theme-toggle-container">
        <button id="theme-toggle" title="Toggle Light/Dark Theme">
            <ion-icon name="sunny-outline"></ion-icon>
        </button>
    </div>

    <div class="app-container tool-container-wrapper">
        <div class="tool-header">
            <h1>Typing Speed</h1>
            <p class="tool-subtitle">Test your WPM and accuracy with live character-by-character feedback.</p>
        </div>

        <div class="tool-card">
            <div class="stats-row">
                <div class="stat-box accent">
                    <ion-icon name="speedometer-outline"></ion-icon>
                    <span class="stat-val" id="wpm">0</span>
                    <span class="stat-label">WPM</span>
                </div>
                <div class="stat-box">
                    <ion-icon name="checkmark-done-outline"></ion-icon>
                    <span class="stat-val" id="accuracy">100</span>
                    <span class="stat-label">Accuracy %</span>
                </div>
                <div class="stat-box">
                    <ion-icon name="timer-outline"></ion-icon>
                    <span class="stat-val" id="time-display">30</span>
                    <span class="stat-label">Seconds</span>
                </div>
                <div class="stat-box">
                    <ion-icon name="keypad-outline"></ion-icon>
                    <span class="stat-val" id="chars-typed">0</span>
                    <span class="stat-label">Characters</span>
                </div>
            </div>

            <div class="settings-bar">
                <div class="setting-group">
                    <label>Duration</label>
                    <div class="duration-pills">
                        <button class="pill" data-time="15">15s</button>
                        <button class="pill active" data-time="30">30s</button>
                        <button class="pill" data-time="60">60s</button>
                        <button class="pill" data-time="120">120s</button>
                    </div>
                </div>
            </div>

            <div class="sample-text" id="sample"></div>

            <textarea id="input" placeholder="Click 'Start Test' then begin typing here..." disabled></textarea>

            <div class="action-row">
                <button id="start-btn" class="action-btn primary">
                    <ion-icon name="play-outline"></ion-icon> Start Test
                </button>
                <button id="restart-btn" class="action-btn secondary hidden">
                    <ion-icon name="refresh-outline"></ion-icon> Restart
                </button>
            </div>
        </div>
    </div>

    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal-card">
            <ion-icon name="trophy-outline" class="modal-icon"></ion-icon>
            <h2>Results</h2>
            <div class="results-grid">
                <div class="result-item">
                    <span class="result-val" id="result-wpm">0</span>
                    <span class="result-label">WPM</span>
                </div>
                <div class="result-item">
                    <span class="result-val" id="result-accuracy">100%</span>
                    <span class="result-label">Accuracy</span>
                </div>
                <div class="result-item">
                    <span class="result-val" id="result-chars">0</span>
                    <span class="result-label">Characters</span>
                </div>
                <div class="result-item">
                    <span class="result-val" id="result-correct">0</span>
                    <span class="result-label">Correct</span>
                </div>
            </div>
            <button id="modal-ok" class="modal-btn">
                <ion-icon name="refresh-outline"></ion-icon> Try Again
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
