<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Speed - FOSSarium</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="game-body">
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>
    <div class="app-container tool-container-wrapper"><a href="../../index.html" class="back-button">&larr; Back to
            FOSSarium</a>
        <div class="tool-header">
            <h1>Typing Speed</h1>
            <p class="tool-subtitle">Test your words per minute.</p>
        </div>
        <div class="stats-row">
            <div class="stat-box"><span class="stat-val" id="wpm">0</span><span class="stat-label">WPM</span></div>
            <div class="stat-box"><span class="stat-val" id="accuracy">100</span><span class="stat-label">Accuracy
                    %</span></div>
            <div class="stat-box"><span class="stat-val" id="time">60</span><span class="stat-label">Seconds</span>
            </div>
        </div>
        <div class="sample-text" id="sample"></div><textarea id="input" placeholder="Start typing to begin the test..."
            disabled></textarea><button id="start-btn" class="action-btn primary">Start Test</button>
    </div>
    <script src="script.js"></script>
</body>

</html>
