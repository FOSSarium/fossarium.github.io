<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font Previewer - FOSSarium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>
    <script>const s=localStorage.getItem('fossarium-theme');if(s==='light'||(!s&&window.matchMedia('(prefers-color-scheme: light)').matches))document.documentElement.classList.add('light-theme');</script>
    <div class="background-blobs"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>
    <div class="theme-toggle-container"><button id="theme-toggle" title="Toggle Theme"><ion-icon name="sunny-outline"></ion-icon></button></div>
    <div class="app-container tool-container-wrapper">
        <div class="tool-header">
            <h1>Font Previewer</h1>
            <p class="tool-subtitle">Live preview of Google Fonts with customizable text and sizes.</p>
        </div>
        <div class="tool-card controls-card">
            <div class="control-grid">
                <div class="field">
                    <label for="text-input">Sample Text</label>
                    <input type="text" id="text-input" value="The quick brown fox jumps over the lazy dog." placeholder="Type to preview...">
                </div>
                <div class="field">
                    <label for="font-size">Font Size: <span id="size-val">32</span>px</label>
                    <input type="range" id="font-size" min="12" max="96" value="32">
                </div>
            </div>
        </div>
        <div class="font-list" id="font-list">
            <!-- Font items will be generated here -->
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
