<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metronome - FOSSarium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="game-body">
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>
    <div class="app-container tool-container-wrapper"><a href="../../index.html" class="back-button">&larr; Back to
            FOSSarium</a>
        <div class="tool-header">
            <h1>Metronome</h1>
            <p class="tool-subtitle">Keep perfect tempo with an audio click.</p>
        </div>
        <div class="bpm-display"><span id="bpm-val">120</span> BPM</div><input type="range" id="bpm-slider" min="30"
            max="300" value="120" class="bpm-slider">
        <div class="controls"><button id="start-btn" class="action-btn primary">Start</button><button id="tap-btn"
                class="action-btn secondary">Tap Tempo</button></div>
        <div class="indicator" id="indicator"></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
