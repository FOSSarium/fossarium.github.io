<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UUID Generator - FOSSarium</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
</head>

<body class="game-body">

    <div class="theme-toggle-container">
        <button id="theme-toggle" title="Toggle Light/Dark Theme">
            <ion-icon name="sunny-outline"></ion-icon>
        </button>
    </div>

    <script>
        const savedTheme = localStorage.getItem('fossarium-theme');
        if (savedTheme === 'light' || (!savedTheme && window.matchMedia('(prefers-color-scheme: light)').matches)) {
            document.documentElement.classList.add('light-theme');
        }
    </script>
    <div class="app-container tool-container-wrapper">
        
        <div class="tool-header">
            <h1>UUID Generator</h1>
            <p class="tool-subtitle">Generate random v4 UUIDs in bulk.</p>
        </div>
        <div class="controls-row">
            <label for="count">Count:</label>
            <input type="number" id="count" value="5" min="1" max="100">
            <button id="generate-btn" class="action-btn primary"><ion-icon name="shuffle-outline"></ion-icon>
                Generate</button>
            <button id="copy-btn" class="action-btn secondary"><ion-icon name="copy-outline"></ion-icon> Copy
                All</button>
        </div>
        <div class="output-area">
            <textarea id="output" readonly placeholder="Generated UUIDs will appear here..."></textarea>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
