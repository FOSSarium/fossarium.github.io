<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UUID Generator - FOSSarium</title>
    <meta name="description" content="Generate unique V4 UUIDs in bulk with format options.">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="/assets/icons/ionicons.esm.js"></script>
    <script nomodule src="/assets/icons/ionicons.js"></script>
</head>

<body>
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="theme-toggle-container">
        <button id="theme-toggle" title="Toggle Light/Dark Theme">
            <ion-icon name="sunny-outline"></ion-icon>
        </button>
    </div>

    <div class="app-container tool-container-wrapper">
        <div class="tool-header">
            <h1>UUID Generator</h1>
            <p class="tool-subtitle">Generate random V4 UUIDs in bulk with format options.</p>
        </div>

        <div class="tool-card">
            <div class="settings-bar">
                <div class="setting-group">
                    <label>Quantity</label>
                    <input type="number" id="count" value="5" min="1" max="100">
                </div>
                <div class="setting-group">
                    <label>Case</label>
                    <select id="case-select">
                        <option value="lower">lowercase</option>
                        <option value="upper">UPPERCASE</option>
                    </select>
                </div>
                <div class="setting-group checkbox">
                    <label class="checkbox-container">
                        <input type="checkbox" id="no-hyphens">
                        <span class="checkmark"></span>
                        Remove hyphens
                    </label>
                </div>
            </div>

            <div class="action-row">
                <button id="generate-btn" class="action-btn primary">
                    <ion-icon name="shuffle-outline"></ion-icon> Generate
                </button>
                <button id="copy-all-btn" class="action-btn secondary">
                    <ion-icon name="copy-outline"></ion-icon> Copy All
                </button>
            </div>

            <div class="uuid-list" id="uuid-list"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
