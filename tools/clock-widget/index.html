<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Clock - FOSSarium</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <!-- Ionicons -->
    <script type="module" src="/assets/icons/ionicons.esm.js"></script>
    <script nomodule src="/assets/icons/ionicons.js"></script>
</head>

<body>
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="theme-toggle-container">
        <button id="theme-toggle" title="Toggle Light/Dark Theme">
            <ion-icon name="sunny-outline"></ion-icon>
        </button>
    </div>

    <div class="app-container tool-container-wrapper">
        <div class="tool-header">
            <h1>Spectrum Clock</h1>
            <p class="tool-subtitle">Precision timekeeping with customizable designs and world time zones.</p>
        </div>

        <div class="clock-layout">
            <div class="tool-card settings-pane">
                <div class="field">
                    <label>Time Zone</label>
                    <select id="timezone-select">
                        <option value="local">Local Time</option>
                        <option value="UTC">UTC (GMT)</option>
                        <option value="America/New_York">New York (EST)</option>
                        <option value="Europe/London">London (GMT/BST)</option>
                        <option value="Europe/Paris">Paris (CET)</option>
                        <option value="Asia/Tokyo">Tokyo (JST)</option>
                        <option value="Asia/Dubai">Dubai (GST)</option>
                        <option value="Asia/Kolkata">India (IST)</option>
                        <option value="Australia/Sydney">Sydney (AEST)</option>
                    </select>
                </div>

                <div class="field">
                    <label>Clock Design</label>
                    <select id="design-select">
                        <option value="modern">Modern Spectrum</option>
                        <option value="minimal">Minimalist</option>
                        <option value="classic">Classic Station</option>
                        <option value="roman">Roman Elegant</option>
                        <option value="dash">Digital Dash</option>
                        <option value="neon">Cyber Neon</option>
                        <option value="tech">Cyber Tech</option>
                    </select>
                </div>

                <div class="field">
                    <label class="checkbox-container">
                        <input type="checkbox" id="hour-format" checked>
                        <span class="checkmark"></span>
                        12-Hour Mode (AM/PM)
                    </label>
                </div>
            </div>

            <div class="tool-card clock-pane">
                <div class="analog-section">
                    <canvas id="clock" width="320" height="320"></canvas>
                </div>

                <div class="digital-section">
                    <div class="digital" id="digital">00:00:00</div>
                    <div class="date" id="date">Monday, March 4, 2026</div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
