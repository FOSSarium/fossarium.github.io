<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Converter - FOSSarium</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="game-body">
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>
    <div class="app-container tool-container-wrapper"><a href="../../index.html" class="back-button">&larr; Back to
            FOSSarium</a>
        <div class="tool-header">
            <h1>Base Converter</h1>
            <p class="tool-subtitle">Convert between Binary, Octal, Decimal, and Hex.</p>
        </div>
        <div class="converter-grid">
            <div class="field"><label>Decimal</label><input type="text" id="dec" placeholder="0"></div>
            <div class="field"><label>Binary</label><input type="text" id="bin" placeholder="0"></div>
            <div class="field"><label>Octal</label><input type="text" id="oct" placeholder="0"></div>
            <div class="field"><label>Hexadecimal</label><input type="text" id="hex" placeholder="0"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
