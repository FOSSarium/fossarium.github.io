<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hash Generator - FOSSarium</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
</head>

<body class="game-body">

    <div class="theme-toggle-container">
        <button id="theme-toggle" title="Toggle Light/Dark Theme">
            <ion-icon name="sunny-outline"></ion-icon>
        </button>
    </div>

    <script>
        const savedTheme = localStorage.getItem('fossarium-theme');
        if (savedTheme === 'light' || (!savedTheme && window.matchMedia('(prefers-color-scheme: light)').matches)) {
            document.documentElement.classList.add('light-theme');
        }
    </script>
    <div class="app-container tool-container-wrapper">
        
        <div class="tool-header">
            <h1>Hash Generator</h1>
            <p class="tool-subtitle">Generate MD5, SHA-1, SHA-256, and SHA-512 hashes.</p>
        </div>
        <div class="input-group">
            <label for="text-input">Your Text</label>
            <textarea id="text-input" placeholder="Type or paste text to hash..."></textarea>
        </div>
        <div class="hash-results">
            <div class="hash-row">
                <span class="hash-label">SHA-256</span>
                <input type="text" id="sha256" readonly>
                <button class="copy-btn" data-target="sha256"><ion-icon name="copy-outline"></ion-icon></button>
            </div>
            <div class="hash-row">
                <span class="hash-label">SHA-512</span>
                <input type="text" id="sha512" readonly>
                <button class="copy-btn" data-target="sha512"><ion-icon name="copy-outline"></ion-icon></button>
            </div>
            <div class="hash-row">
                <span class="hash-label">SHA-1</span>
                <input type="text" id="sha1" readonly>
                <button class="copy-btn" data-target="sha1"><ion-icon name="copy-outline"></ion-icon></button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
