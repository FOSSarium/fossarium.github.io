<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Translator - FOSSarium</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <!-- Ionicons -->
    <script type="module" src="/assets/icons/ionicons.esm.js"></script>
    <script nomodule src="/assets/icons/ionicons.js"></script>
</head>

<body>
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="theme-toggle-container">
        <button id="theme-toggle" title="Toggle Light/Dark Theme">
            <ion-icon name="sunny-outline"></ion-icon>
        </button>
    </div>

    <div class="app-container tool-container-wrapper">
        <div class="tool-header">
            <h1>Binary Translator</h1>
            <p class="tool-subtitle">Convert text to binary and vice versa instantly.</p>
        </div>

        <div class="translator-card">
            <div class="editor-grid">
                <div class="pane">
                    <label for="text">Text Input</label>
                    <textarea id="text" placeholder="Type text here..."></textarea>
                </div>

                <div class="pane">
                    <label for="binary">Binary Output</label>
                    <textarea id="binary" placeholder="Binary code will appear here..."></textarea>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
