<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON to CSV Converter - FOSSarium</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <!-- Ionicons -->
    <script type="module" src="/assets/icons/ionicons.esm.js"></script>
    <script nomodule src="/assets/icons/ionicons.js"></script>
</head>

<body>
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="theme-toggle-container">
        <button id="theme-toggle" title="Toggle Light/Dark Theme">
            <ion-icon name="sunny-outline"></ion-icon>
        </button>
    </div>

    <div class="app-container tool-container-wrapper">
        <div class="tool-header">
            <h1>JSON to CSV</h1>
            <p class="tool-subtitle">Transform structured JSON arrays into clean comma-separated values instantly.</p>
        </div>

        <div class="tool-card">
            <div class="input-methods">
                <div class="upload-area" id="drop-zone">
                    <ion-icon name="cloud-upload-outline"></ion-icon>
                    <p>Drag & Drop JSON file or <span>Browse</span></p>
                    <input type="file" id="file-input" accept=".json" hidden>
                </div>
                <div class="method-divider"><span>OR</span></div>
                <div class="url-input-area">
                    <div class="url-field">
                        <ion-icon name="link-outline"></ion-icon>
                        <input type="text" id="url-input"
                            placeholder="Paste JSON URL (e.g. https://api.example.com/data)">
                        <button id="fetch-btn" class="icon-btn" title="Fetch URL">
                            <ion-icon name="arrow-forward-outline"></ion-icon>
                        </button>
                    </div>
                    <button id="paste-btn" class="secondary-btn full-width">
                        <ion-icon name="clipboard-outline"></ion-icon> Paste from Clipboard
                    </button>
                </div>
            </div>

            <div class="settings-bar">
                <div class="setting-group">
                    <label>Delimiter</label>
                    <select id="delimiter-select">
                        <option value=",">Comma (,)</option>
                        <option value=";">Semicolon (;)</option>
                        <option value="tab">Tab</option>
                    </select>
                </div>
                <div class="setting-group checkbox">
                    <label class="checkbox-container">
                        <input type="checkbox" id="include-headers" checked>
                        <span class="checkmark"></span>
                        Include Header Row
                    </label>
                </div>
            </div>

            <div class="editor-layout">
                <div class="editor-pane">
                    <div class="pane-header">
                        <label>JSON Input</label>
                        <button class="icon-btn" id="clear-btn" title="Clear">
                            <ion-icon name="trash-outline"></ion-icon>
                        </button>
                    </div>
                    <textarea id="json-input"
                        placeholder='[&#10;  {"name": "Alice", "age": 30, "city": "NYC"},&#10;  {"name": "Bob", "age": 25, "city": "LA"}&#10;]'></textarea>
                </div>
                <div class="editor-pane">
                    <div class="pane-header">
                        <label>CSV Output</label>
                        <div class="header-actions">
                            <button class="icon-btn" id="copy-btn" title="Copy">
                                <ion-icon name="copy-outline"></ion-icon>
                            </button>
                            <button class="icon-btn" id="download-btn" title="Download">
                                <ion-icon name="download-outline"></ion-icon>
                            </button>
                        </div>
                    </div>
                    <textarea id="csv-output" readonly placeholder="CSV result will appear here..."></textarea>
                </div>
            </div>

            <div id="preview-section" class="preview-section hidden">
                <div class="pane-header">
                    <label>Data Preview</label>
                </div>
                <div class="table-container">
                    <table id="preview-table"></table>
                </div>
            </div>
        </div>
    </div>
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal-card">
            <ion-icon name="alert-circle-outline" class="modal-icon"></ion-icon>
            <h2>Notice</h2>
            <p>Message goes here.</p>
            <button id="modal-ok" class="modal-btn">OK</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
