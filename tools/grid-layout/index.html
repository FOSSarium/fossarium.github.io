<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid Generator - FOSSarium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>
    <script>const s=localStorage.getItem('fossarium-theme');if(s==='light'||(!s&&window.matchMedia('(prefers-color-scheme: light)').matches))document.documentElement.classList.add('light-theme');</script>
    <div class="background-blobs"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>
    <div class="theme-toggle-container"><button id="theme-toggle" title="Toggle Theme"><ion-icon name="sunny-outline"></ion-icon></button></div>
    <div class="app-container tool-container-wrapper">
        <div class="tool-header"><h1>CSS Grid Generator</h1><p class="tool-subtitle">Visually create complex grid layouts and export the code.</p></div>
        <div class="grid-layout">
            <div class="tool-card controls-pane">
                <div class="field"><label for="cols">Columns</label><input type="text" id="cols" value="1fr 1fr 1fr"></div>
                <div class="field"><label for="rows">Rows</label><input type="text" id="rows" value="1fr 1fr"></div>
                <div class="field"><label for="col-gap">Column Gap</label><input type="number" id="col-gap" value="20" min="0"></div>
                <div class="field"><label for="row-gap">Row Gap</label><input type="number" id="row-gap" value="20" min="0"></div>
            </div>
            <div class="tool-card preview-pane"><div class="grid-container" id="container"></div></div>
        </div>
        <div class="tool-card code-output-card">
            <div class="code-header"><label>Generated CSS</label><button id="copy-btn" class="icon-btn" title="Copy CSS"><ion-icon name="copy-outline"></ion-icon></button></div>
            <pre><code id="code"></code></pre>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
