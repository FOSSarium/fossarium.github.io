<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Palette Generator - FOSSarium</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <!-- Ionicons -->
    <script type="module" src="/assets/icons/ionicons.esm.js"></script>
    <script nomodule src="/assets/icons/ionicons.js"></script>
</head>

<body>
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="theme-toggle-container">
        <button id="theme-toggle" title="Toggle Light/Dark Theme">
            <ion-icon name="sunny-outline"></ion-icon>
        </button>
    </div>

    <div class="app-container tool-container-wrapper">
        <div class="tool-header">
            <h1>Palette Generator</h1>
            <p class="tool-subtitle">Create beautiful, balanced color schemes starting from a single color.</p>
        </div>

        <div class="tool-card">
            <div class="input-section">
                <div class="field">
                    <label for="base">Base Color</label>
                    <div class="input-row">
                        <input type="color" id="base" value="#58a6ff">
                        <input type="text" id="base-hex" value="#58a6ff">
                    </div>
                </div>
            </div>

            <div class="palette-grid" id="palette">
                <!-- Swatches generated by script.js -->
            </div>

            <div class="hint-text">
                <ion-icon name="information-circle-outline"></ion-icon>
                Click any color to copy its hex code.
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
