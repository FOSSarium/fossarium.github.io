<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter - FOSSarium</title>
    <link rel="stylesheet" href="style.css">

    <!-- Ionicons for beautiful icons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>

    <div class="theme-toggle-container">
        <button id="theme-toggle" title="Toggle Light/Dark Theme">
            <ion-icon name="sunny-outline"></ion-icon>
        </button>
    </div>

>
    <header>
        <h1>Unit Converter</h1>
    </header>
    <main>
        <section class="converter-card">
            <h2>Length Converter</h2>
            <div class="input-group">
                <input type="number" id="inputValue" value="1" min="0">
                <select id="inputUnit">
                    <option value="meters">Meters</option>
                    <option value="feet">Feet</option>
                    <option value="inches">Inches</option>
                </select>
            </div>
            <div class="output-group">
                <p>Result:</p>
                <span id="outputValue"></span>
                <select id="outputUnit">
                    <option value="feet">Feet</option>
                    <option value="meters">Meters</option>
                    <option value="inches">Inches</option>
                </select>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2024 FOSSarium Project</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
