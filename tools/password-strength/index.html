<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength - FOSSarium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="game-body">
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>
    <div class="app-container tool-container-wrapper"><a href="../../index.html" class="back-button">&larr; Back to
            FOSSarium</a>
        <div class="tool-header">
            <h1>Password Strength</h1>
            <p class="tool-subtitle">Check password entropy and estimated crack time.</p>
        </div><input type="text" id="pw-input" class="pw-input" placeholder="Enter a password..." autocomplete="off">
        <div class="strength-bar">
            <div class="strength-fill" id="strength-fill"></div>
        </div>
        <div class="strength-label" id="strength-label">Type a password above</div>
        <div class="details" id="details"></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
