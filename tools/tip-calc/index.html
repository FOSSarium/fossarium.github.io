<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip Calculator - FOSSarium</title>
    <meta name="description" content="Calculate tips and split bills effortlessly.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="/assets/icons/ionicons.esm.js"></script>
    <script nomodule src="/assets/icons/ionicons.js"></script>
</head>
<body>
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>
    <div class="background-blobs"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>
    <div class="theme-toggle-container"><button id="theme-toggle" title="Toggle Light/Dark Theme"><ion-icon name="sunny-outline"></ion-icon></button></div>
    <div class="app-container tool-container-wrapper">
        <div class="tool-header"><h1>Tip Calculator</h1><p class="tool-subtitle">Calculate tips and split bills between any number of people.</p></div>
        <div class="tool-card">
            <div class="field"><label for="bill">Bill Amount</label><div class="input-with-icon"><span class="icon">$</span><input type="number" id="bill" placeholder="0.00" min="0" step="0.01"></div></div>
            <div class="field"><label>Tip Percentage</label>
                <div class="tip-presets">
                    <button class="tip-btn" data-tip="10">10%</button>
                    <button class="tip-btn active" data-tip="15">15%</button>
                    <button class="tip-btn" data-tip="18">18%</button>
                    <button class="tip-btn" data-tip="20">20%</button>
                    <button class="tip-btn" data-tip="25">25%</button>
                </div>
                <div class="custom-tip"><label for="custom-tip">Custom</label><input type="number" id="custom-tip" placeholder="15" min="0" max="100">%</div>
            </div>
            <div class="field"><label for="people">Split Between</label>
                <div class="stepper"><button class="step-btn" id="dec-people"><ion-icon name="remove-outline"></ion-icon></button><span id="people-count">1</span><button class="step-btn" id="inc-people"><ion-icon name="add-outline"></ion-icon></button></div>
            </div>
            <div class="results">
                <div class="result-row"><span>Tip Amount</span><span class="result-val" id="tip-amount">$0.00</span></div>
                <div class="result-row"><span>Total</span><span class="result-val" id="total">$0.00</span></div>
                <div class="result-row highlight"><span>Per Person</span><span class="result-val" id="per-person">$0.00</span></div>
            </div>
            <button id="reset-btn" class="reset-btn"><ion-icon name="refresh-outline"></ion-icon> Reset</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
