<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip Calculator - FOSSarium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <!-- Ionicons for beautiful icons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body class="game-body">
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>

    <div class="theme-toggle-container">
        <button id="theme-toggle" title="Toggle Light/Dark Theme">
            <ion-icon name="sunny-outline"></ion-icon>
        </button>
    </div>

    <div class="app-container tool-container-wrapper">
        <div class="tool-header">
            <h1>Tip Calculator</h1>
            <p class="tool-subtitle">Split bills and calculate tips.</p>
        </div><label>Bill Amount ($)</label><input type="number" id="bill" value="85.50"><label>Tip %</label>
        <div class="tip-btns"><button class="tip-btn" data-t="10">10%</button><button class="tip-btn active"
                data-t="15">15%</button><button class="tip-btn" data-t="18">18%</button><button class="tip-btn"
                data-t="20">20%</button><button class="tip-btn" data-t="25">25%</button></div><label>Split
            Between</label><input type="number" id="split" value="1" min="1">
        <div class="results" id="results"></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
