<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PX to REM Converter - FOSSarium</title>
    <meta name="description" content="Convert pixel values to REM and vice-versa for responsive web design.">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="/assets/icons/ionicons.esm.js"></script>
    <script nomodule src="/assets/icons/ionicons.js"></script>
</head>

<body>
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="theme-toggle-container">
        <button id="theme-toggle" title="Toggle Light/Dark Theme">
            <ion-icon name="sunny-outline"></ion-icon>
        </button>
    </div>

    <div class="app-container tool-container-wrapper">
        <div class="tool-header">
            <h1>PX ↔ REM</h1>
            <p class="tool-subtitle">Instantly convert between PX and REM for responsive design.</p>
        </div>

        <div class="tool-card">
            <div class="base-setting">
                <label for="base-size">Base Font Size</label>
                <div class="base-row">
                    <input type="number" id="base-size" value="16" min="1" max="100">
                    <span class="base-unit">px</span>
                </div>
            </div>

            <div class="converter-grid">
                <div class="conv-col">
                    <label for="px-input">Pixels (px)</label>
                    <div class="conv-input-wrap">
                        <input type="number" id="px-input" placeholder="16" step="any">
                        <button class="copy-btn" id="copy-px" title="Copy"><ion-icon name="copy-outline"></ion-icon></button>
                    </div>
                </div>
                <div class="swap-col">
                    <button id="swap-btn" class="swap-btn" title="Swap">
                        <ion-icon name="swap-horizontal-outline"></ion-icon>
                    </button>
                </div>
                <div class="conv-col">
                    <label for="rem-input">REM</label>
                    <div class="conv-input-wrap">
                        <input type="number" id="rem-input" placeholder="1" step="any">
                        <button class="copy-btn" id="copy-rem" title="Copy"><ion-icon name="copy-outline"></ion-icon></button>
                    </div>
                </div>
            </div>

            <div class="reference-section">
                <h3><ion-icon name="grid-outline"></ion-icon> Quick Reference</h3>
                <div class="ref-table">
                    <div class="ref-header">
                        <span>PX</span>
                        <span>REM</span>
                        <span>PT</span>
                    </div>
                    <div class="ref-body" id="ref-body"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden">
        <ion-icon name="checkmark-circle"></ion-icon>
        <span id="toast-message">Copied!</span>
    </div>

    <script src="script.js"></script>
</body>

</html>
