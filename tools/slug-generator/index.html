<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Slug Generator - FOSSarium</title>
    <meta name="description" content="Transform titles and text into URL-friendly slugs with customizable options.">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="/assets/icons/ionicons.esm.js"></script>
    <script nomodule src="/assets/icons/ionicons.js"></script>
</head>

<body>
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="theme-toggle-container">
        <button id="theme-toggle" title="Toggle Light/Dark Theme">
            <ion-icon name="sunny-outline"></ion-icon>
        </button>
    </div>

    <div class="app-container tool-container-wrapper">
        <div class="tool-header">
            <h1>Slug Generator</h1>
            <p class="tool-subtitle">Transform any title into a clean, URL-friendly slug in real-time.</p>
        </div>

        <div class="tool-card">
            <div class="input-section">
                <label for="text-input">Enter your title or text</label>
                <textarea id="text-input" placeholder="e.g. My Awesome Blog Post! (2024)" rows="3"></textarea>
            </div>

            <div class="slug-display">
                <span class="slug-text" id="slug-output">your-slug-here</span>
                <div class="slug-actions">
                    <button class="icon-btn" id="copy-btn" title="Copy">
                        <ion-icon name="copy-outline"></ion-icon>
                    </button>
                </div>
            </div>

            <div class="slug-stats" id="slug-stats">
                <span class="stat"><strong id="char-count">0</strong> chars</span>
                <span class="stat-sep">·</span>
                <span class="stat"><strong id="word-count">0</strong> words</span>
            </div>

            <div class="options-section">
                <h3><ion-icon name="options-outline"></ion-icon> Options</h3>
                <div class="option-grid">
                    <label class="option-item">
                        <span>Separator</span>
                        <select id="separator">
                            <option value="-" selected>Hyphen (-)</option>
                            <option value="_">Underscore (_)</option>
                            <option value=".">Dot (.)</option>
                        </select>
                    </label>
                    <label class="option-item">
                        <span>Case</span>
                        <select id="case-select">
                            <option value="lower" selected>lowercase</option>
                            <option value="upper">UPPERCASE</option>
                        </select>
                    </label>
                    <label class="option-item check-option">
                        <input type="checkbox" id="remove-numbers"> Remove numbers
                    </label>
                    <label class="option-item check-option">
                        <input type="checkbox" id="max-length-check"> Max length
                    </label>
                </div>
                <div class="max-length-row hidden" id="max-length-row">
                    <label for="max-length-val">Maximum characters</label>
                    <input type="number" id="max-length-val" value="60" min="5" max="200">
                </div>
            </div>

            <div class="examples-section">
                <h3><ion-icon name="document-text-outline"></ion-icon> Try Examples</h3>
                <div class="example-grid">
                    <button class="example-btn" data-text="How to Build a REST API with Node.js (2024 Guide)">Blog Title</button>
                    <button class="example-btn" data-text="Déjà Vu: A Café's Naïve Résumé">Accented</button>
                    <button class="example-btn" data-text="iPhone 15 Pro Max — First Impressions!!!">Product</button>
                    <button class="example-btn" data-text="React vs Vue vs Angular: Which Framework is Best?">Comparison</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden">
        <ion-icon name="checkmark-circle"></ion-icon>
        <span id="toast-message">Copied!</span>
    </div>

    <script src="script.js"></script>
</body>

</html>
