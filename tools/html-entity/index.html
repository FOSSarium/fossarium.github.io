<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Entity Encoder - FOSSarium</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
</head>

<body class="game-body">
    <script>const s = localStorage.getItem('fossarium-theme'); if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) document.documentElement.classList.add('light-theme');</script>
    <div class="app-container tool-container-wrapper"><a href="../../index.html" class="back-button">&larr; Back to
            FOSSarium</a>
        <div class="tool-header">
            <h1>HTML Entities</h1>
            <p class="tool-subtitle">Encode/Decode HTML entity characters.</p>
        </div>
        <div class="actions-bar"><button id="encode-btn" class="action-btn primary"><ion-icon
                    name="lock-closed-outline"></ion-icon> Encode</button><button id="decode-btn"
                class="action-btn secondary"><ion-icon name="lock-open-outline"></ion-icon> Decode</button><button
                id="copy-btn" class="action-btn secondary"><ion-icon name="copy-outline"></ion-icon> Copy</button></div>
        <div class="editor-layout">
            <div class="editor-pane"><label>Input</label><textarea id="input"
                    placeholder='<div class="hello">World & "Friends"</div>'></textarea></div>
            <div class="editor-pane"><label>Output</label><textarea id="output" readonly></textarea></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
